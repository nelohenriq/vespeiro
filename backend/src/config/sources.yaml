# ──────────────────────────────────────────────────
# Project Vespeiro — Source Definitions
# Strategy: RSS real (RTP) + Google News RSS (restantes) + light scrape (Lusa)
# Custo: $0 — todas as fontes são gratuitas e não requerem API keys
# ──────────────────────────────────────────────────

sources:
  - id: lusa
    name: "Lusa — Agência de Notícias"
    # Sem RSS público (B2B pago). Google News RSS capta conteúdo syndicado.
    type: google_news_rss
    url: "https://news.google.com/rss/search?q=site:lusa.pt&hl=pt-PT&ceid=PT:pt"
    language: pt
    category: agency
    schedule_interval_minutes: 30
    extraction_strategy: trafilatura

  - id: rtp_noticias
    name: "RTP Notícias"
    # RSS oficial: rtp.pt/noticias/rss (feed geral).
    # Existem também feeds por categoria: /pais, /mundo, /desporto, /economia, /cultura
    type: rss
    url: "https://www.rtp.pt/noticias/rss"
    language: pt
    category: public_broadcaster
    schedule_interval_minutes: 30
    extraction_strategy: newspaper4k

  - id: publico
    name: "Público"
    # RSS oficial descontinuado ~2022. Google News RSS como alternativa.
    type: google_news_rss
    url: "https://news.google.com/rss/search?q=site:publico.pt&hl=pt-PT&ceid=PT:pt"
    language: pt
    category: mainstream
    schedule_interval_minutes: 30
    extraction_strategy: trafilatura

