<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b1a"/>
      <stop offset="100%" stop-color="#0d1230"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00f5d4"/>
    </linearGradient>
    <linearGradient id="accent-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00f5d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="600" height="630" fill="url(#accent-fade)"/>

  <!-- Grid pattern -->
  <g stroke="rgba(0,212,170,0.04)" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Hexagon logo -->
  <g transform="translate(150, 315)">
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round" transform="rotate(-15)"/>
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="rgba(0,212,170,0.1)" stroke="url(#accent)" stroke-width="1.5" stroke-linejoin="round" transform="rotate(-15)"/>
    <circle cx="-13" cy="-7" r="4" fill="#00d4aa"/>
  </g>

  <!-- Title -->
  <text x="280" y="280" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" fill="#e0e6ed" letter-spacing="-1">
    <tspan fill="url(#accent)">V</tspan>espeiro
  </text>

  <!-- Subtitle -->
  <text x="280" y="330" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="400" fill="#8892b0" letter-spacing="2">
    Media Narrative Intelligence
  </text>

  <!-- Divider -->
  <line x1="280" y1="360" x2="520" y2="360" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Description -->
  <text x="280" y="400" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556080" letter-spacing="0.5">
    Cross-source story matching · Narrative divergence
  </text>
  <text x="280" y="428" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556080" letter-spacing="0.5">
    Lusa dependency · Silence detection · Daily alerts
  </text>

  <!-- Accent bottom bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.8"/>
</svg>
