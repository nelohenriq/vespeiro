<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1230"/>
      <stop offset="100%" stop-color="#070b1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00f5d4"/>
    </linearGradient>
    <linearGradient id="accent-dim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00f5d4" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="url(#accent-dim)" stroke-width="2"/>
  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#accent-dim)" stroke-width="1" stroke-dasharray="2 4"/>
  <!-- Hexagon (wasp nest motif) -->
  <polygon points="50,18 75,32 75,60 50,74 25,60 25,32" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
  </polygon>
  <!-- Inner hexagon -->
  <polygon points="50,28 65,36 65,52 50,60 35,52 35,36" fill="url(#accent-dim)" stroke="url(#accent)" stroke-width="1.5" stroke-linejoin="round" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="50" cy="44" r="3" fill="url(#accent)">
    <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
