<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Vespeiro — Page Not Found</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070b1a;
        color: #e0e6ed;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-font-smoothing: antialiased;
      }
      .container { text-align: center; max-width: 480px; padding: 40px 24px; }
      .logo {
        width: 64px; height: 64px; margin: 0 auto 24px;
      }
      .code { font-size: 5rem; font-weight: 800; background: linear-gradient(135deg, #00d4aa, #00f5d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
      .title { font-size: 1.3rem; font-weight: 600; margin-top: 12px; }
      .desc { color: #8892b0; margin-top: 8px; line-height: 1.6; font-size: 0.92rem; }
      .btn {
        display: inline-block; margin-top: 28px; padding: 12px 28px;
        background: #11173a; color: #e0e6ed; text-decoration: none;
        border-radius: 8px; border: 1px solid #1a2450;
        font-size: 0.9rem; font-weight: 500; transition: all 0.2s;
      }
      .btn:hover { background: #161d4a; border-color: #253060; }
    </style>
    <script>
      // SPA redirect: GitHub Pages serves 404.html for any 404.
      // Redirect to index.html preserving the path for client-side routing.
      sessionStorage.redirect = location.href;
    </script>
  </head>
  <body>
    <div class="container">
      <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="#0d1230" stroke="rgba(0,212,170,0.15)" stroke-width="2"/>
        <polygon points="50,22 72,34 72,58 50,70 28,58 28,34" fill="none" stroke="#00d4aa" stroke-width="2.5" stroke-linejoin="round"/>
        <polygon points="50,30 62,38 62,52 50,60 38,52 38,38" fill="rgba(0,212,170,0.1)" stroke="#00d4aa" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="48" cy="44" r="3" fill="#00d4aa"/>
      </svg>
      <div class="code">404</div>
      <div class="title">Page not found</div>
      <p class="desc">
        The page you're looking for doesn't exist or has moved.
        If you were viewing a dashboard tab, try navigating from the homepage.
      </p>
      <a class="btn" href="./">← Back to Dashboard</a>
    </div>
  </body>
</html>
